<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAW â€” Ignore</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap');

:root {
  --bg0:  #080808;
  --bg1:  #0c0c0c;
  --bg2:  #111111;
  --bg3:  #181818;
  --bg4:  #202020;
  --bg5:  #2a2a2a;
  --ln:   rgba(255,255,255,.06);
  --ln2:  rgba(255,255,255,.10);
  --t0:   rgba(255,255,255,.92);
  --t1:   rgba(255,255,255,.65);
  --t2:   rgba(255,255,255,.35);
  --t3:   rgba(255,255,255,.15);
  --acc:  #a855f7;
  --acc2: #7c3aed;
  --acc-g: rgba(168,85,247,.13);
  --tab-h: 34px;
  --nav-h: 48px;
  --chrome-h: 82px;
  --f: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
  color-scheme: dark;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg0);
  font-family: var(--f);
  color: var(--t0);
  -webkit-font-smoothing: antialiased;
  user-select: none;
  font-size: 13px;
}

#shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}

/* CHROME */
#chrome {
  flex-shrink: 0;
  height: var(--chrome-h);
  min-height: var(--chrome-h);
  max-height: var(--chrome-h);
  background: var(--bg1);
  border-bottom: 1px solid var(--ln);
  position: relative;
  z-index: 100001;
  display: flex;
  flex-direction: column;
  -webkit-app-region: drag;
  box-shadow: 0 1px 4px rgba(0,0,0,.4);
}
#chrome::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, #a855f7 35%, #7c3aed 65%, transparent 100%);
  opacity: .65;
  pointer-events: none; z-index: 1;
}
#chrome button, #chrome input,
#chrome .tab, #chrome .tab-close, #chrome #btn-new-tab,
#chrome #omnibox, #chrome #nav-right,
#chrome #win-controls { -webkit-app-region: no-drag; }

/* TAB ROW */
#tab-row {
  height: var(--tab-h);
  min-height: var(--tab-h);
  max-height: var(--tab-h);
  display: flex;
  align-items: flex-end;
  overflow: visible;
  flex-shrink: 0;
  -webkit-app-region: drag;
}
#tab-row > * { -webkit-app-region: no-drag; }

#ig-badge {
  display: flex; align-items: center; gap: 5px;
  height: 22px; padding: 0 9px; margin: 0 0 4px 8px;
  border-radius: 5px; flex-shrink: 0;
  background: rgba(168,85,247,.12);
  border: 1px solid rgba(168,85,247,.22);
  font-size: 9.5px; font-weight: 600; letter-spacing: .08em;
  color: rgba(168,85,247,.75); text-transform: uppercase;
  -webkit-app-region: no-drag;
}

#tab-area {
  display: flex;
  align-items: flex-end;
  flex: 1; min-width: 0;
  overflow: hidden; height: 100%;
}
#tab-strip {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  flex: 0 1 auto; min-width: 0;
  overflow-x: auto; overflow-y: hidden;
  padding-left: 4px; height: 100%;
  -webkit-app-region: no-drag;
  scroll-behavior: smooth;
}
#tab-strip::-webkit-scrollbar { display: none; }

.tab {
  position: relative;
  display: flex; align-items: center; gap: 5px;
  height: 100%; padding: 0 6px 0 8px;
  border-radius: 6px 6px 0 0;
  background: transparent; cursor: pointer;
  flex: 0 0 160px; width: 160px; min-width: 60px; max-width: 180px;
  border: 1px solid transparent; border-bottom: none;
  overflow: hidden;
  -webkit-app-region: no-drag;
  transition: background 0.1s;
}
.tab:hover { background: rgba(255,255,255,.04); }
.tab.active {
  background: var(--bg2);
  border-color: var(--ln);
  border-bottom-color: var(--bg2);
  z-index: 2;
}
.tab.active::before {
  content: '';
  position: absolute; top: 0; left: 6px; right: 6px; height: 2px;
  background: linear-gradient(90deg, #a855f7, #7c3aed);
  border-radius: 0 0 2px 2px;
}
.tab-spin {
  width: 11px; height: 11px; flex-shrink: 0;
  border: 1.5px solid var(--bg5); border-top-color: var(--acc);
  border-radius: 50%; animation: spin .65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.tab-fav { width: 12px; height: 12px; flex-shrink: 0; border-radius: 2px; object-fit: contain; display: block; }
.tab-title {
  flex: 1; min-width: 40px;
  font-size: 11.5px; font-weight: 400;
  color: var(--t2); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -.01em;
}
.tab.active .tab-title { color: var(--t0); }
.tab-close {
  width: 14px; height: 14px; flex-shrink: 0;
  border: none; background: transparent; border-radius: 3px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0; color: var(--t2); padding: 0;
  transition: opacity .1s, background .1s, color .1s;
  -webkit-app-region: no-drag;
}
.tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
.tab-close:hover { background: rgba(255,80,80,.2); color: #ff5f57; }
.tab-close svg { display: block; pointer-events: none; }

#btn-new-tab {
  flex-shrink: 0;
  width: 28px; height: 28px; margin: 0 2px 0;
  align-self: flex-end;
  border: none; background: transparent; border-radius: 5px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--t3);
  transition: color .12s, background .12s;
  -webkit-app-region: no-drag;
}
#btn-new-tab:hover { color: var(--t1); background: rgba(255,255,255,.06); }
#tab-row-spacer { flex: 1; min-width: 8px; height: 100%; -webkit-app-region: drag; }

/* Window controls */
#win-controls {
  display: flex; align-items: center; gap: 0;
  flex-shrink: 0; align-self: center;
  -webkit-app-region: no-drag;
}
.wc-btn {
  width: 46px; height: 32px;
  border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--t2); transition: background .1s, color .1s;
  -webkit-app-region: no-drag;
}
.wc-btn:hover { background: rgba(255,255,255,.08); color: var(--t1); }
.wc-btn.close:hover { background: #e81123; color: #fff; }
.wc-btn svg { display: block; pointer-events: none; }

/* NAV ROW */
#nav-row {
  height: var(--nav-h);
  min-height: var(--nav-h);
  max-height: var(--nav-h);
  display: grid;
  grid-template-columns: max-content 1fr max-content;
  align-items: center;
  padding: 0 4px;
  border-top: 1px solid var(--ln);
  background: var(--bg2);
  flex-shrink: 0;
  -webkit-app-region: drag;
}
#nav-left, #nav-right { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }
#nav-left  { justify-self: start; }
#nav-right { justify-self: end; }
#nav-row > * { -webkit-app-region: no-drag; }

.ib {
  width: 28px; height: 28px; flex-shrink: 0;
  border: none; background: transparent; border-radius: 6px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--t2); position: relative;
  transition: background .12s, color .12s;
  -webkit-app-region: no-drag;
}
.ib:hover  { background: var(--bg4); color: var(--t1); }
.ib:active { background: var(--bg5); }
.ib:disabled { opacity: .2; pointer-events: none; }
.ib svg { display: block; pointer-events: none; }

#omni-wrap {
  flex: 1; min-width: 0;
  display: flex; align-items: center;
  padding: 0 4px;
  -webkit-app-region: no-drag;
  position: relative;
}
#omni-inner {
  position: relative; width: 100%; height: 32px;
  display: flex; align-items: center;
}
#url-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: rgba(168,85,247,.55); display: flex; align-items: center;
  z-index: 2; pointer-events: none;
}
#omnibox {
  position: relative; width: 100%; height: 32px;
  background: var(--bg3); border: 1px solid var(--ln);
  border-radius: 10px; padding: 0 12px 0 30px;
  font-family: var(--f); font-size: 12.5px; font-weight: 400;
  color: var(--t0); outline: none; caret-color: var(--acc);
  letter-spacing: -.01em;
  transition: border-color .15s, background .15s, box-shadow .15s;
  -webkit-app-region: no-drag;
}
#omnibox::placeholder { color: var(--t3); }
#omnibox:focus {
  border-color: rgba(168,85,247,.35);
  background: rgba(168,85,247,.02);
  box-shadow: 0 0 0 2.5px rgba(168,85,247,.13);
}

#prog {
  position: absolute; bottom: 0; left: 0;
  height: 1px; width: 0%; opacity: 0;
  background: linear-gradient(90deg, #a855f7, rgba(124,58,237,.6));
  pointer-events: none;
  transition: width .3s ease, opacity .2s;
}
#prog.on { opacity: 1; }

/* CONTENT */
#body {
  flex: 1; overflow: hidden;
  position: relative; background: transparent;
}

/* NEW TAB PAGE */
#newtab {
  position: absolute; inset: 0;
  background: var(--bg0);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 5;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
#newtab.vis { opacity: 1; pointer-events: auto; }
.nt-ig-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(168,85,247,.08); border: 1px solid rgba(168,85,247,.18);
  display: flex; align-items: center; justify-content: center;
  color: rgba(168,85,247,.55);
}
.nt-title {
  font-size: 22px; font-weight: 600; color: var(--t0);
  letter-spacing: -.03em;
}
.nt-title span { color: var(--acc); }
.nt-sub {
  font-size: 12.5px; color: var(--t3);
  text-align: center; line-height: 1.7; max-width: 340px;
}
.nt-search-inner {
  position: relative;
  width: 480px; max-width: 90vw;
}
.nt-search-inner .nt-s-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--t3); display: flex; align-items: center;
  pointer-events: none; z-index: 1;
}
.nt-search {
  width: 100%; height: 40px;
  background: var(--bg3); border: 1px solid var(--ln);
  border-radius: 10px; padding: 0 14px 0 34px;
  font-family: var(--f); font-size: 13.5px; font-weight: 400;
  color: var(--t0); outline: none; caret-color: var(--acc);
  letter-spacing: -.01em;
  transition: border-color .15s, box-shadow .15s;
}
.nt-search::placeholder { color: var(--t3); }
.nt-search:focus {
  border-color: rgba(168,85,247,.35);
  box-shadow: 0 0 0 3px rgba(168,85,247,.13);
  background: rgba(168,85,247,.02);
}
.nt-pills {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  margin-top: -4px;
}
.nt-pill {
  display: flex; align-items: center; gap: 5px;
  height: 24px; padding: 0 10px; border-radius: 6px;
  background: var(--bg3); border: 1px solid var(--ln);
  font-size: 11px; color: var(--t2);
}
.nt-pill svg { color: var(--acc); opacity: .6; flex-shrink: 0; }
</style>
</head>
<body>
<div id="shell">

  <!-- CHROME -->
  <div id="chrome">
    <!-- TAB ROW -->
    <div id="tab-row">
      <div id="ig-badge">
        <svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M4.5 1L1.5 2.5v2.75C1.5 7 2.8 8.15 4.5 8.6 6.2 8.15 7.5 7 7.5 5.25V2.5L4.5 1Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>
        Ignore
      </div>
      <div id="tab-area">
        <div id="tab-strip"></div>
        <button id="btn-new-tab" title="New private tab (Ctrl+T)">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div id="tab-row-spacer"></div>
      <div id="win-controls">
        <button class="wc-btn" id="wc-min" title="Minimize">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 5.5h9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
        <button class="wc-btn" id="wc-max" title="Maximize">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="1" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button class="wc-btn close" id="wc-close" title="Close">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 1.5l8 8M9.5 1.5l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <!-- NAV ROW -->
    <div id="nav-row">
      <div id="nav-left">
        <button class="ib" id="btn-back" title="Back (Alt+Left)" disabled>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 2.5L4 7l4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="ib" id="btn-fwd" title="Forward (Alt+Right)" disabled>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5.5 2.5L10 7l-4.5 4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="ib" id="btn-reload" title="Reload (Ctrl+R)">
          <svg id="ico-reload" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7A4.5 4.5 0 0 1 11 4.2M11 4.2V1.5M11 4.2H8.3" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/><path d="M11.5 7A4.5 4.5 0 0 1 3 9.8M3 9.8v2.7M3 9.8h2.7" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div id="omni-wrap">
        <div id="omni-inner">
          <span id="url-icon">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1.5" y="5.5" width="9" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.1"/><path d="M3.5 5.5V3.5a2.5 2.5 0 0 1 5 0v2" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          </span>
          <input id="omnibox" type="text" autocomplete="off" spellcheck="false" placeholder="Search or enter address"/>
          <div id="prog"></div>
        </div>
      </div>
      <div id="nav-right"></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="body">
    <div id="newtab" class="vis">
      <div class="nt-ig-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M7 14V11a7 7 0 0 1 14 0v3" fill="currentColor" opacity=".7"/>
          <rect x="2" y="14" width="24" height="3.5" rx="1.75" fill="currentColor"/>
          <circle cx="8.5" cy="22" r="3.8" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="19.5" cy="22" r="3.8" stroke="currentColor" stroke-width="1.6"/>
          <path d="M12.3 22h3.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="nt-title">New <span>Private</span> Tab</div>
      <div class="nt-sub">Your browsing activity in this window won&rsquo;t be saved.<br>No history &middot; No cookies &middot; Fully isolated session.</div>
      <div class="nt-search-inner">
        <span class="nt-s-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.2" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </span>
        <input class="nt-search" id="nt-search" type="text" autocomplete="off" spellcheck="false" placeholder="Search privately or enter address"/>
      </div>
      <div class="nt-pills">
        <div class="nt-pill"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1L1.5 2.75v2.5C1.5 7.5 3 8.8 5 9.25 7 8.8 8.5 7.5 8.5 5.25v-2.5L5 1Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>Ads blocked</div>
        <div class="nt-pill"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.1"/><path d="M3 5l1.4 1.5L7.5 3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>No tracking</div>
        <div class="nt-pill"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x="1.5" y="4.5" width="7" height="5" rx="1" stroke="currentColor" stroke-width="1.1"/><path d="M3 4.5V3a2 2 0 1 1 4 0v1.5" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>Session isolated</div>
        <div class="nt-pill"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 2h6M2 5h4M2 8h3" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/><path d="M8.5 6l-1.5 2 1 1" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>No history saved</div>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';
const { ipcRenderer } = require('electron');

const tabs = [];
let activeId = null;
let _loading = false;

const tabStrip  = document.getElementById('tab-strip');
const newTabBtn = document.getElementById('btn-new-tab');
const omnibox   = document.getElementById('omnibox');
const btnBack   = document.getElementById('btn-back');
const btnFwd    = document.getElementById('btn-fwd');
const btnReload = document.getElementById('btn-reload');
const newtab    = document.getElementById('newtab');
const ntSearch  = document.getElementById('nt-search');
const prog      = document.getElementById('prog');
const icoReload = document.getElementById('ico-reload');

const RELOAD_PATHS = `<path d="M2.5 7A4.5 4.5 0 0 1 11 4.2M11 4.2V1.5M11 4.2H8.3" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/><path d="M11.5 7A4.5 4.5 0 0 1 3 9.8M3 9.8v2.7M3 9.8h2.7" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>`;
const STOP_PATHS  = `<path d="M3 3l8 8M11 3L3 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>`;

function setLoadingUI(on) {
  _loading = on;
  if (icoReload) icoReload.innerHTML = on ? STOP_PATHS : RELOAD_PATHS;
  btnReload.title = on ? 'Stop (Esc)' : 'Reload (Ctrl+R)';
  if (prog) {
    if (on) { prog.style.width = '0%'; prog.classList.add('on'); prog.style.width = '70%'; }
    else    { prog.style.width = '100%'; setTimeout(() => { prog.classList.remove('on'); prog.style.width = '0%'; }, 300); }
  }
}

function computeTabWidth() {
  const n = tabs.length;
  if (!n) return 160;
  const avail = (tabStrip.parentElement?.clientWidth || 600) - 40;
  return Math.max(60, Math.min(180, Math.floor(avail / n)));
}

function renderTabs() {
  const w = computeTabWidth();
  tabStrip.innerHTML = '';
  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.id === activeId ? ' active' : '');
    el.style.cssText = `flex:0 0 ${w}px;width:${w}px;`;
    el.dataset.id = t.id;
    let inner = '';
    if (t.loading) {
      inner += '<div class="tab-spin"></div>';
    } else if (t.favicon) {
      inner += `<img class="tab-fav" src="${t.favicon}" onerror="this.remove()"/>`;
    } else {
      inner += `<svg class="tab-fav" width="12" height="12" viewBox="0 0 12 12" fill="none" style="color:var(--t3)"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.1"/></svg>`;
    }
    const title = (t.title || 'New Tab').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    inner += `<span class="tab-title">${title}</span>`;
    inner += `<button class="tab-close"><svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 1.5l5 5M6.5 1.5l-5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></button>`;
    el.innerHTML = inner;
    el.addEventListener('mousedown', e => { if (!e.target.closest('.tab-close')) ipcRenderer.send('ig:tab:activate', t.id); });
    el.querySelector('.tab-close').addEventListener('click', e => { e.stopPropagation(); ipcRenderer.send('ig:tab:close', t.id); });
    tabStrip.appendChild(el);
  });
}

function updateNewtab() {
  const t = tabs.find(t => t.id === activeId);
  newtab.classList.toggle('vis', !!(t && t.url === 'newtab'));
}

ipcRenderer.on('ig:tab:add',      (_, d) => { tabs.push({...d}); renderTabs(); updateNewtab(); });
ipcRenderer.on('ig:tab:activate', (_, id) => {
  activeId = id; renderTabs(); updateNewtab();
  const t = tabs.find(t => t.id === id);
  if (t && document.activeElement !== omnibox)
    omnibox.value = (t.url && t.url !== 'newtab') ? t.url : '';
});
ipcRenderer.on('ig:tab:remove',   (_, id) => { const i = tabs.findIndex(t => t.id === id); if (i !== -1) tabs.splice(i,1); renderTabs(); updateNewtab(); });
ipcRenderer.on('ig:tab:update',   (_, d)  => { const t = tabs.find(t => t.id === d.id); if (t) Object.assign(t, d); renderTabs(); if (d.id === activeId) updateNewtab(); });
ipcRenderer.on('ig:nav:state',    (_, st) => {
  if (document.activeElement !== omnibox)
    omnibox.value = (st.url && st.url !== 'newtab') ? st.url : '';
  btnBack.disabled = !st.canBack;
  btnFwd.disabled  = !st.canFwd;
  setLoadingUI(!!st.loading);
  updateNewtab();
});

function navigate(raw) {
  const v = raw.trim(); if (!v) return;
  ipcRenderer.send('ig:nav:go', v);
  omnibox.value = v; omnibox.blur();
}

newTabBtn.addEventListener('click', () => ipcRenderer.send('ig:tab:create', 'newtab'));
btnBack.addEventListener('click',   () => ipcRenderer.send('ig:nav:back'));
btnFwd.addEventListener('click',    () => ipcRenderer.send('ig:nav:forward'));
btnReload.addEventListener('click', () => _loading ? ipcRenderer.send('ig:nav:stop') : ipcRenderer.send('ig:nav:reload'));

omnibox.addEventListener('keydown', e => {
  if (e.key === 'Enter')  { e.preventDefault(); navigate(omnibox.value); }
  if (e.key === 'Escape') { if (_loading) ipcRenderer.send('ig:nav:stop'); omnibox.blur(); }
});
omnibox.addEventListener('focus', () => omnibox.select());
ntSearch.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); navigate(ntSearch.value); ntSearch.value = ''; }
});

document.getElementById('wc-close').addEventListener('click', () => ipcRenderer.send('ig:win:close'));
document.getElementById('wc-min').addEventListener('click',   () => ipcRenderer.send('ig:win:minimize'));
document.getElementById('wc-max').addEventListener('click',   () => ipcRenderer.send('ig:win:maximize'));

document.addEventListener('keydown', e => {
  const mod = process.platform === 'darwin' ? e.metaKey : e.ctrlKey;
  if (mod && e.key === 't') { e.preventDefault(); ipcRenderer.send('ig:tab:create', 'newtab'); }
  if (mod && e.key === 'w') { e.preventDefault(); if (activeId) ipcRenderer.send('ig:tab:close', activeId); }
  if (mod && e.key === 'l') { e.preventDefault(); omnibox.focus(); omnibox.select(); }
  if (mod && e.key === 'r') { e.preventDefault(); ipcRenderer.send('ig:nav:reload'); }
  if (e.key === 'F5')       { e.preventDefault(); ipcRenderer.send('ig:nav:reload'); }
  if (e.key === 'Escape' && _loading) ipcRenderer.send('ig:nav:stop');
});

window.addEventListener('resize', renderTabs);
</script>
</body>
</html>
